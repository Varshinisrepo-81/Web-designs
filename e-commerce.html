<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-commerce UI</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#F8BFA0; /* peach */
}

/* white main card */
.container{
  width:85%;
  margin:40px auto;
  background:#fff;
  border-radius:20px;
  padding:30px 50px;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

/* navbar */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu a{
  margin:0 15px;
  text-decoration:none;
  color:#8B6B4A;
  font-weight:bold;
}

/* hero section */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:40px;
}

/* left text */
.left h1{
  color:#E88AAE; /* pink */
  font-size:48px;
}

.left p{
  color:#8B6B4A;
  letter-spacing:3px;
}

/* buy button */
.buy-btn{
  margin-top:30px;
  padding:12px 30px;
  background:#CFA15D;
  color:white;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}

/* right product */
.right{
  position:relative;
}

.circle{
  width:300px;
  height:300px;
  background:#E6A27C;
  border-radius:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.circle img{
  width:280px;
  border-radius:80000000px;
  shape-image-threshold: circle(50%);
}

/* oval slogans */
.tag{
  position:absolute;
  background:white;
  color:#8B6B4A;
  padding:10px 20px;
  border-radius:50px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  transition:0.3s;
}

.tag:hover{
  background:#fff;
  color:#E88AAE;
}

.tag.one{ top:20px; right:-40px; }
.tag.two{ bottom:30px; left:-60px; }

/* continue shopping */
.continue{
  text-align:right;
  margin-top:20px;
  color:#C97A5A;
  font-weight:bold;
  cursor:pointer;
}



</style>
</head>
